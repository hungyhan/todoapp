apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: todo-ingress
  namespace: todo-app

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing

    alb.ingress.kubernetes.io/group.name: alb-do2602-group

    alb.ingress.kubernetes.io/target-type: ip

    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'

    alb.ingress.kubernetes.io/ssl-redirect: "443"

    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-1:527055790396:certificate/227a8d05-eb92-4c74-9306-2f16b66b8916
spec:
  ingressClassName: alb

  rules:
    - host: todo.do2602.click

      http:
        paths:
          - path: /

            pathType: Prefix

            backend:
              service:
                name: todo-client-service

                port:
                  number: 3000

    - host: api.do2602.click

      http:
        paths:
          - path: /

            pathType: Prefix

            backend:
              service:
                name: todo-server-service

                port:
                  number: 5000
